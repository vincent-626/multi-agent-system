version: "3.9"

# Local Mac development.
# Ollama runs natively for Metal GPU acceleration — start it with:
#   ollama serve
# For cloud / Linux deployment use docker-compose.cloud.yml instead.

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
      - LLM_MODEL=qwen3
      - FAST_MODEL=qwen3:1.7b
    env_file:
      - .env
    volumes:
      - ./docs:/app/docs
      - ./memory:/app/memory

volumes:
  qdrant_data:
