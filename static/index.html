<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:   #1a1d23;
      --bg-mid:    #22262e;
      --bg-light:  #f4f5f7;
      --border:    #2e3340;
      --accent:    #4f8ef7;
      --accent-dim:#2a4a8a;
      --text:      #e2e4e9;
      --text-dim:  #8b92a5;
      --green:     #3ecf8e;
      --yellow:    #f5a623;
      --red:       #e85d5d;
      --mono:      'Fira Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: var(--bg-mid);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header p  { font-size: 0.8rem; color: var(--text-dim); }

    #health-dots { margin-left: auto; display: flex; gap: 10px; align-items: center; font-size: 0.75rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .dot.ok  { background: var(--green); }
    .dot.err { background: var(--red); }

    /* ── Layout ─────────────────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    aside {
      width: 280px;
      min-width: 240px;
      background: var(--bg-mid);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 20px;
      flex-shrink: 0;
    }

    aside h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      font-size: 0.82rem;
      color: var(--text-dim);
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); color: var(--text); }
    .upload-zone input { display: none; }

    #upload-status {
      font-size: 0.78rem;
      color: var(--text-dim);
      min-height: 18px;
    }

    /* ── Content area ───────────────────────────────────────────── */
    section.content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-light);
      color: #1a1d23;
    }

    /* ── Chat thread ─────────────────────────────────────────────── */
    #response-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Individual chat entry ───────────────────────────────────── */
    .chat-entry {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .user-bubble {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-radius: 16px 16px 4px 16px;
      padding: 10px 16px;
      max-width: 75%;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .assistant-entry {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Spinner (per entry) ─────────────────────────────────────── */
    .entry-spinner {
      display: none;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-size: 0.9rem;
      padding: 8px 0;
    }
    .entry-spinner.active { display: flex; }

    .spin-ring {
      width: 18px; height: 18px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Reasoning trace ─────────────────────────────────────────── */
    details.trace {
      background: var(--bg-dark);
      border-radius: 8px;
      overflow: hidden;
    }
    details.trace summary {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      user-select: none;
      background: var(--bg-mid);
    }
    details.trace summary:hover { background: var(--border); }

    .trace-rows { padding: 4px 0; }

    .trace-row {
      display: grid;
      grid-template-columns: 130px 110px 1fr;
      gap: 6px;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .trace-row:last-child { border-bottom: none; }
    .trace-row .agent  { color: var(--accent); font-weight: 600; }
    .trace-row .action { color: var(--yellow); }
    .trace-row .output { color: var(--text); white-space: pre-wrap; word-break: break-word; }

    /* ── Thinking disclosure ──────────────────────────────────────── */
    .thinking-details { border-bottom: 1px solid var(--border); }
    .thinking-details summary {
      padding: 3px 14px;
      cursor: pointer;
      font-size: 0.68rem;
      color: var(--text-dim);
      font-style: italic;
      user-select: none;
      list-style: none;
    }
    .thinking-details summary::before { content: '▶ '; font-style: normal; font-size: 0.6rem; }
    .thinking-details[open] summary::before { content: '▼ '; }
    .thinking-details summary:hover { color: var(--text); }
    .thinking-content {
      padding: 6px 14px 10px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-word;
      border-top: 1px dashed var(--border);
    }

    /* ── Answer card ─────────────────────────────────────────────── */
    .answer-card {
      background: #fff;
      border: 1px solid #dde1ea;
      border-radius: 10px;
      padding: 18px 20px;
      line-height: 1.65;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    /* ── Meta badges ─────────────────────────────────────────────── */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #e8ebf2;
      color: #444;
    }
    .badge.conf-high   { background: #d4f5e5; color: #1a7a52; }
    .badge.conf-medium { background: #fef3cc; color: #7a5a00; }
    .badge.conf-low    { background: #fde0e0; color: #7a1a1a; }
    .badge.memory      { background: #dde9ff; color: #1a3a8a; }
    .badge.web         { background: #e6d9fa; color: #4a1a8a; }
    .badge.source      { background: #e8ebf2; color: #333; }
    .badge.web-src     { background: #e8ebf2; }
    .badge.web-src a   { color: var(--accent-dim); text-decoration: none; font-size: 0.72rem; }
    .badge.web-src a:hover { text-decoration: underline; }
    .badge.history-ts  { background: #f0f0f0; color: #888; font-weight: 400; font-style: italic; }

    /* ── Input bar ───────────────────────────────────────────────── */
    .input-bar {
      border-top: 1px solid #dde1ea;
      background: #fff;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    #question-input {
      flex: 1;
      border: 1px solid #ccd0da;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .15s;
    }
    #question-input:focus { border-color: var(--accent); }
    #question-input:disabled { background: #f0f1f4; }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .9; }
    .btn-secondary { background: #e8ebf2; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #d8dce8; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Multi-Agent System</h1>
    <p>Orchestrator · RAG Specialist · Web Search · Calculator</p>
  </div>
  <div id="health-dots">
    <span class="dot" id="dot-ollama" title="Ollama"></span> Ollama
    <span class="dot" id="dot-qdrant" title="Qdrant"></span> Qdrant
  </div>
</header>

<main>
  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside>
    <div>
      <h2>API Key</h2>
      <input
        type="password"
        id="api-key-input"
        placeholder="Leave blank if not set"
        style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-dark);color:var(--text);font-size:0.82rem;outline:none;"
      />
    </div>

    <div>
      <h2>Upload Document</h2>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".pdf,.txt" />
        Drop a PDF or TXT here<br/>or click to browse
      </div>
      <div id="upload-status"></div>
    </div>
  </aside>

  <!-- ── Content ─────────────────────────────────────────────────── -->
  <section class="content">
    <div id="response-area">
      <!-- conversation entries injected here -->
    </div>

    <div class="input-bar">
      <input
        type="text"
        id="question-input"
        placeholder="Ask a question…"
        autocomplete="off"
      />
      <button class="btn btn-primary" id="submit-btn" onclick="submitQuery()">Ask</button>
      <button class="btn btn-secondary" id="clear-btn" onclick="clearThread()">Clear</button>
    </div>
  </section>
</main>

<script>
// ── User identity ────────────────────────────────────────────────────────────
const USER_ID = (() => {
  const key = 'mas_user_id';
  let id = localStorage.getItem(key);
  if (!id) { id = crypto.randomUUID(); localStorage.setItem(key, id); }
  return id;
})();

// ── API key ───────────────────────────────────────────────────────────────────
const apiKeyInput = document.getElementById('api-key-input');
apiKeyInput.value = localStorage.getItem('mas_api_key') || '';
apiKeyInput.addEventListener('input', () => localStorage.setItem('mas_api_key', apiKeyInput.value));
function apiKeyParam() {
  const k = apiKeyInput.value.trim();
  return k ? '?api_key=' + encodeURIComponent(k) : '';
}
function apiKeyQS(existing = '') {
  const k = apiKeyInput.value.trim();
  if (!k) return existing;
  const sep = existing.includes('?') ? '&' : '?';
  return existing + sep + 'api_key=' + encodeURIComponent(k);
}

// ── Health check ─────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    document.getElementById('dot-ollama').className = 'dot ' + (d.ollama ? 'ok' : 'err');
    document.getElementById('dot-qdrant').className = 'dot ' + (d.qdrant ? 'ok' : 'err');
  } catch (_) {}
}
checkHealth();
setInterval(checkHealth, 15000);

// ── Upload ───────────────────────────────────────────────────────────────────
const uploadZone   = document.getElementById('upload-zone');
const fileInput    = document.getElementById('file-input');
const uploadStatus = document.getElementById('upload-status');

uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files[0]) doUpload(fileInput.files[0]); });
uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]);
});

async function doUpload(file) {
  uploadStatus.textContent = `Uploading ${file.name}…`;
  uploadStatus.style.color = '';
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/ingest' + apiKeyParam(), { method: 'POST', body: fd });
    const d = await r.json();
    if (r.ok) {
      uploadStatus.textContent = `✓ ${file.name} — ${d.chunks} chunks ingested`;
      uploadStatus.style.color = '#1a7a52';
    } else {
      uploadStatus.textContent = `✗ ${d.detail || 'Upload failed'}`;
      uploadStatus.style.color = '#c0392b';
    }
  } catch (_) {
    uploadStatus.textContent = '✗ Network error';
    uploadStatus.style.color = '#c0392b';
  }
}

// ── Chat thread ───────────────────────────────────────────────────────────────
const thread = document.getElementById('response-area');

// Load history on init
async function loadHistory() {
  try {
    const url = apiKeyQS(`/history?user_id=${encodeURIComponent(USER_ID)}`);
    const r = await fetch(url);
    if (!r.ok) return;
    const items = await r.json();
    items.forEach(item => appendHistoryEntry(item));
    if (items.length > 0) scrollToBottom();
  } catch (_) {}
}

function appendHistoryEntry(item) {
  const { entry } = buildEntry(item.question);
  const ts = new Date(item.timestamp).toLocaleString();
  renderAnswer(entry, {
    answer:      item.answer,
    sources:     item.sources,
    web_sources: item.web_sources,
    confidence:  item.confidence,
    from_memory: false,
    timestamp:   ts,
  });
  thread.appendChild(entry);
}

// Build a new empty chat entry, return handles to its inner elements
function buildEntry(question) {
  const entry = document.createElement('div');
  entry.className = 'chat-entry';

  const userBubble = document.createElement('div');
  userBubble.className = 'user-bubble';
  userBubble.textContent = question;

  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'assistant-entry';

  const spinner = document.createElement('div');
  spinner.className = 'entry-spinner';
  spinner.innerHTML = '<div class="spin-ring"></div> Thinking…';

  const traceDetails = document.createElement('details');
  traceDetails.className = 'trace';
  const traceSummary = document.createElement('summary');
  traceSummary.innerHTML = 'Reasoning Trace <span class="trace-count"></span>';
  const traceRowsDiv = document.createElement('div');
  traceRowsDiv.className = 'trace-rows';
  traceDetails.appendChild(traceSummary);
  traceDetails.appendChild(traceRowsDiv);
  traceDetails.style.display = 'none';

  const answerCard = document.createElement('div');
  answerCard.className = 'answer-card';
  answerCard.style.display = 'none';

  const metaRow = document.createElement('div');
  metaRow.className = 'meta-row';

  assistantDiv.appendChild(spinner);
  assistantDiv.appendChild(traceDetails);
  assistantDiv.appendChild(answerCard);
  assistantDiv.appendChild(metaRow);

  entry.appendChild(userBubble);
  entry.appendChild(assistantDiv);

  return { entry, spinner, traceDetails, traceSummary, traceRowsDiv, answerCard, metaRow };
}

function renderAnswer(entry, ev) {
  const answerCard  = entry.querySelector('.answer-card');
  const metaRow     = entry.querySelector('.meta-row');
  const spinner     = entry.querySelector('.entry-spinner');
  const traceDetails = entry.querySelector('details.trace');

  if (spinner)      { spinner.classList.remove('active'); }
  if (traceDetails) { traceDetails.open = false; }

  answerCard.textContent = ev.answer;
  answerCard.style.display = 'block';

  // Confidence
  const conf = (ev.confidence || 'medium').toLowerCase();
  metaRow.appendChild(badge(`Confidence: ${conf}`, 'badge conf-' + conf));

  if (ev.from_memory) metaRow.appendChild(badge('From memory', 'badge memory'));
  if (ev.web_sources && ev.web_sources.length > 0)
    metaRow.appendChild(badge('Web search used', 'badge web'));

  (ev.sources || []).forEach(s => metaRow.appendChild(badge('📄 ' + s, 'badge source')));

  (ev.web_sources || []).forEach(url => {
    const b = document.createElement('span');
    b.className = 'badge web-src';
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = '🔗 ' + truncate(url, 40);
    b.appendChild(a);
    metaRow.appendChild(b);
  });

  if (ev.timestamp)
    metaRow.appendChild(badge(ev.timestamp, 'badge history-ts'));
}

// ── Active query state ────────────────────────────────────────────────────────
let currentEntry = null;
let stepCount = 0;

function submitQuery() {
  const input = document.getElementById('question-input');
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  setLoading(true);

  // Create and attach the new entry immediately
  const handles = buildEntry(q);
  handles.spinner.classList.add('active');
  thread.appendChild(handles.entry);
  currentEntry = handles;
  stepCount = 0;
  scrollToBottom();

  fetch('/query' + apiKeyParam(), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: q, user_id: USER_ID }),
  }).then(resp => {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function pump() {
      reader.read().then(({ done, value }) => {
        if (done) { setLoading(false); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') { setLoading(false); return; }
            try { handleEvent(JSON.parse(raw)); } catch (_) {}
          }
        }
        pump();
      });
    }
    pump();
  }).catch(err => {
    setLoading(false);
    if (currentEntry) {
      const card = currentEntry.answerCard;
      card.textContent = '⚠ Error: ' + err.message;
      card.style.display = 'block';
      card.style.borderColor = '#e85d5d';
      currentEntry.spinner.classList.remove('active');
    }
  });
}

function handleEvent(ev) {
  if (!currentEntry) return;

  if (ev.type === 'step') {
    stepCount++;
    const countEl = currentEntry.traceDetails.querySelector('.trace-count');
    if (countEl) countEl.textContent = `(${stepCount})`;
    currentEntry.traceDetails.style.display = '';
    currentEntry.traceDetails.open = true;

    const row = document.createElement('div');
    row.className = 'trace-row';
    row.innerHTML =
      `<span class="agent">${esc(ev.agent)}</span>` +
      `<span class="action">${esc(ev.action)}${ev.tool_used ? ' [' + esc(ev.tool_used) + ']' : ''}</span>` +
      `<span class="output">${esc(ev.output || '')}</span>`;
    currentEntry.traceRowsDiv.appendChild(row);

    if (ev.thinking) {
      const details = document.createElement('details');
      details.className = 'thinking-details';
      const summary = document.createElement('summary');
      summary.textContent = 'thinking';
      const content = document.createElement('div');
      content.className = 'thinking-content';
      content.textContent = ev.thinking;
      details.appendChild(summary);
      details.appendChild(content);
      currentEntry.traceRowsDiv.appendChild(details);
    }

    scrollToBottom();
  }

  if (ev.type === 'final') {
    renderAnswer(currentEntry.entry, ev);
    scrollToBottom();
  }

  if (ev.type === 'error') {
    const card = currentEntry.answerCard;
    card.textContent = '⚠ Error: ' + ev.message;
    card.style.display = 'block';
    card.style.borderColor = '#e85d5d';
    currentEntry.spinner.classList.remove('active');
  }
}

function setLoading(on) {
  document.getElementById('question-input').disabled = on;
  document.getElementById('submit-btn').disabled = on;
  if (!on && currentEntry) {
    currentEntry.spinner.classList.remove('active');
    currentEntry = null;
  }
}

function clearThread() {
  thread.innerHTML = '';
  currentEntry = null;
  stepCount = 0;
}

function scrollToBottom() {
  thread.scrollTop = thread.scrollHeight;
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function badge(text, cls) {
  const el = document.createElement('span');
  el.className = cls;
  el.textContent = text;
  return el;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

// Submit on Enter
document.getElementById('question-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuery(); }
});

// Load history on init
loadHistory();
</script>
</body>
</html>
