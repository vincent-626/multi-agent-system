<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Physics Research Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --bg-mid:    #161b22;
      --bg-card:   #1c2128;
      --border:    #30363d;
      --accent:    #4f8ef7;
      --accent-dim:#1f3a6e;
      --text:      #e6edf3;
      --text-dim:  #8b949e;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --mono:      'Fira Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      background: var(--bg-mid);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-icon {
      font-size: 1.3rem;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .header-title {
      display: flex;
      align-items: center;
    }
    .header-title h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .header-title p {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 1px;
    }

    #health-dots {
      margin-left: auto;
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .health-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.err { background: var(--red); }

    /* ── Layout ──────────────────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow-y: auto;
      flex-direction: column;
    }

    main::-webkit-scrollbar { width: 6px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .main-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Chat thread ─────────────────────────────────────────────── */
    #response-area {
      flex: 1;
      padding: 28px 0;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── Individual chat entry ────────────────────────────────────── */
    .chat-entry {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .user-bubble {
      align-self: flex-end;
      background: var(--accent-dim);
      border: 1px solid #2d4f9e;
      color: #c8d8ff;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 16px;
      max-width: 72%;
      font-size: 0.9rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .assistant-entry {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Spinner ─────────────────────────────────────────────────── */
    .entry-spinner {
      display: none;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 0.85rem;
      padding: 6px 0;
    }
    .entry-spinner.active { display: flex; }

    .spin-ring {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Reasoning trace ─────────────────────────────────────────── */
    details.trace {
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    details.trace summary {
      padding: 9px 14px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-dim);
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details.trace summary::before { content: '▶'; font-size: 0.6rem; }
    details.trace[open] summary::before { content: '▼'; }
    details.trace summary:hover { color: var(--text); }
    .trace-count { font-weight: 400; }

    .trace-rows { padding: 2px 0; }

    .trace-row {
      display: grid;
      grid-template-columns: 120px 120px 1fr;
      gap: 6px;
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.71rem;
      color: var(--text-dim);
    }
    .trace-row .agent  { color: var(--accent); font-weight: 600; }
    .trace-row .action { color: var(--yellow); }
    .trace-row .output { color: var(--text); white-space: pre-wrap; word-break: break-word; }

    /* ── Thinking disclosure ──────────────────────────────────────── */
    .thinking-details { border-top: 1px solid var(--border); }
    .thinking-details summary {
      padding: 4px 14px;
      cursor: pointer;
      font-size: 0.67rem;
      color: var(--text-dim);
      font-style: italic;
      user-select: none;
      list-style: none;
    }
    .thinking-details summary::before { content: '▶ '; font-style: normal; font-size: 0.58rem; }
    .thinking-details[open] summary::before { content: '▼ '; }
    .thinking-details summary:hover { color: var(--text); }
    .thinking-content {
      padding: 6px 14px 10px;
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-word;
      border-top: 1px dashed var(--border);
    }

    /* ── Answer card ─────────────────────────────────────────────── */
    .answer-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      line-height: 1.7;
      font-size: 0.92rem;
      white-space: pre-wrap;
      color: var(--text);
    }

    /* ── Meta badges ─────────────────────────────────────────────── */
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--bg-mid);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .badge.conf-high   { background: #0d2a1a; color: #3fb950; border-color: #1a4a2a; }
    .badge.conf-medium { background: #2a1f00; color: #d29922; border-color: #4a3800; }
    .badge.conf-low    { background: #2a0a0a; color: #f85149; border-color: #4a1a1a; }
    .badge.memory      { background: #0d1f3a; color: #79b8ff; border-color: #1a3a6e; }
    .badge.web         { background: #1a0d2a; color: #b388ff; border-color: #3a1a5a; }
    .badge.source      { background: var(--bg-mid); color: var(--text-dim); }
    .badge.web-src     { background: var(--bg-mid); border-color: var(--border); }
    .badge.web-src a   { color: var(--accent); text-decoration: none; font-size: 0.7rem; }
    .badge.web-src a:hover { text-decoration: underline; }
    .badge.history-ts  { color: var(--text-dim); font-weight: 400; font-style: italic; }

    /* ── Input bar ───────────────────────────────────────────────── */
    .input-wrapper {
      flex-shrink: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 0 20px;
    }

    .input-bar {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 0 18px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #question-input {
      flex: 1;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    #question-input::placeholder { color: var(--text-dim); }
    #question-input:focus { border-color: var(--accent); }
    #question-input:disabled { opacity: .5; }

    #submit-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, background .15s;
    }
    #submit-btn:hover:not(:disabled) { opacity: .85; }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }
    #submit-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<header>
  <span class="header-icon">⚛</span>
  <div class="header-title">
    <h1>Particle Physics Research Agent</h1>
  </div>
  <div id="health-dots">
    <div class="health-item"><span class="dot" id="dot-ollama"></span>Ollama</div>
    <div class="health-item"><span class="dot" id="dot-qdrant"></span>Qdrant</div>
  </div>
</header>

<main id="scroll-area">
  <div class="main-inner">
    <div id="response-area"></div>
  </div>
</main>

<div class="input-wrapper">
  <div class="input-bar">
    <input
      type="text"
      id="question-input"
      placeholder="Ask about particle physics…"
      autocomplete="off"
    />
    <button id="submit-btn" onclick="submitQuery()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ── User identity ─────────────────────────────────────────────────────────────
const USER_ID = (() => {
  const key = 'mas_user_id';
  let id = localStorage.getItem(key);
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem(key, id);
  }
  return id;
})();

// ── Health check ──────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    document.getElementById('dot-ollama').className = 'dot ' + (d.ollama ? 'ok' : 'err');
    document.getElementById('dot-qdrant').className = 'dot ' + (d.qdrant ? 'ok' : 'err');
  } catch (_) {}
}
checkHealth();
setInterval(checkHealth, 15000);

// ── Chat thread ───────────────────────────────────────────────────────────────
const thread = document.getElementById('response-area');
const scrollArea = document.getElementById('scroll-area');

async function loadHistory() {
  try {
    const r = await fetch(`/history?user_id=${encodeURIComponent(USER_ID)}`);
    if (!r.ok) return;
    const items = await r.json();
    items.forEach(item => appendHistoryEntry(item));
    if (items.length > 0) scrollToBottom();
  } catch (_) {}
}

function appendHistoryEntry(item) {
  const { entry } = buildEntry(item.question);
  const ts = new Date(item.timestamp).toLocaleString();
  renderAnswer(entry, {
    answer:      item.answer,
    sources:     item.sources,
    web_sources: item.web_sources,
    confidence:  item.confidence,
    from_memory: false,
    timestamp:   ts,
  });
  thread.appendChild(entry);
}

function buildEntry(question) {
  const entry = document.createElement('div');
  entry.className = 'chat-entry';

  const userBubble = document.createElement('div');
  userBubble.className = 'user-bubble';
  userBubble.textContent = question;

  const assistantDiv = document.createElement('div');
  assistantDiv.className = 'assistant-entry';

  const spinner = document.createElement('div');
  spinner.className = 'entry-spinner';
  spinner.innerHTML = '<div class="spin-ring"></div> Thinking…';

  const traceDetails = document.createElement('details');
  traceDetails.className = 'trace';
  const traceSummary = document.createElement('summary');
  traceSummary.innerHTML = 'Reasoning trace <span class="trace-count"></span>';
  const traceRowsDiv = document.createElement('div');
  traceRowsDiv.className = 'trace-rows';
  traceDetails.appendChild(traceSummary);
  traceDetails.appendChild(traceRowsDiv);
  traceDetails.style.display = 'none';

  const answerCard = document.createElement('div');
  answerCard.className = 'answer-card';
  answerCard.style.display = 'none';

  const metaRow = document.createElement('div');
  metaRow.className = 'meta-row';

  assistantDiv.appendChild(spinner);
  assistantDiv.appendChild(traceDetails);
  assistantDiv.appendChild(answerCard);
  assistantDiv.appendChild(metaRow);

  entry.appendChild(userBubble);
  entry.appendChild(assistantDiv);

  return { entry, spinner, traceDetails, traceSummary, traceRowsDiv, answerCard, metaRow };
}

function renderAnswer(entry, ev) {
  const answerCard   = entry.querySelector('.answer-card');
  const metaRow      = entry.querySelector('.meta-row');
  const spinner      = entry.querySelector('.entry-spinner');
  const traceDetails = entry.querySelector('details.trace');

  if (spinner)      spinner.classList.remove('active');
  if (traceDetails) traceDetails.open = false;

  answerCard.textContent = ev.answer;
  answerCard.style.display = 'block';

  const conf = (ev.confidence || 'medium').toLowerCase();
  metaRow.appendChild(badge(`Confidence: ${conf}`, 'badge conf-' + conf));

  if (ev.from_memory) metaRow.appendChild(badge('From memory', 'badge memory'));
  if (ev.web_sources && ev.web_sources.length > 0)
    metaRow.appendChild(badge('Web search used', 'badge web'));

  (ev.sources || []).forEach(s => metaRow.appendChild(badge('📄 ' + s, 'badge source')));

  (ev.web_sources || []).forEach(url => {
    const b = document.createElement('span');
    b.className = 'badge web-src';
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = '🔗 ' + truncate(url, 40);
    b.appendChild(a);
    metaRow.appendChild(b);
  });

  if (ev.timestamp)
    metaRow.appendChild(badge(ev.timestamp, 'badge history-ts'));
}

// ── Active query state ────────────────────────────────────────────────────────
let currentEntry = null;
let stepCount = 0;

function submitQuery() {
  const input = document.getElementById('question-input');
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  setLoading(true);

  const handles = buildEntry(q);
  handles.spinner.classList.add('active');
  thread.appendChild(handles.entry);
  currentEntry = handles;
  stepCount = 0;
  scrollToBottom();

  fetch('/query', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: q, user_id: USER_ID }),
  }).then(resp => {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function pump() {
      reader.read().then(({ done, value }) => {
        if (done) { setLoading(false); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') { setLoading(false); return; }
            try { handleEvent(JSON.parse(raw)); } catch (_) {}
          }
        }
        pump();
      });
    }
    pump();
  }).catch(err => {
    setLoading(false);
    if (currentEntry) {
      const card = currentEntry.answerCard;
      card.textContent = '⚠ Error: ' + err.message;
      card.style.display = 'block';
      card.style.borderColor = 'var(--red)';
      currentEntry.spinner.classList.remove('active');
    }
  });
}

function handleEvent(ev) {
  if (!currentEntry) return;

  if (ev.type === 'step') {
    stepCount++;
    const countEl = currentEntry.traceDetails.querySelector('.trace-count');
    if (countEl) countEl.textContent = `(${stepCount})`;
    currentEntry.traceDetails.style.display = '';
    currentEntry.traceDetails.open = true;

    const row = document.createElement('div');
    row.className = 'trace-row';
    row.innerHTML =
      `<span class="agent">${esc(ev.agent)}</span>` +
      `<span class="action">${esc(ev.action)}${ev.tool_used ? ' [' + esc(ev.tool_used) + ']' : ''}</span>` +
      `<span class="output">${esc(ev.output || '')}</span>`;
    currentEntry.traceRowsDiv.appendChild(row);

    if (ev.thinking) {
      const details = document.createElement('details');
      details.className = 'thinking-details';
      const summary = document.createElement('summary');
      summary.textContent = 'thinking';
      const content = document.createElement('div');
      content.className = 'thinking-content';
      content.textContent = ev.thinking;
      details.appendChild(summary);
      details.appendChild(content);
      currentEntry.traceRowsDiv.appendChild(details);
    }

    scrollToBottom();
  }

  if (ev.type === 'final') {
    renderAnswer(currentEntry.entry, ev);
    scrollToBottom();
  }

  if (ev.type === 'error') {
    const card = currentEntry.answerCard;
    card.textContent = '⚠ Error: ' + ev.message;
    card.style.display = 'block';
    card.style.borderColor = 'var(--red)';
    currentEntry.spinner.classList.remove('active');
  }
}

function setLoading(on) {
  document.getElementById('question-input').disabled = on;
  document.getElementById('submit-btn').disabled = on;
  if (!on && currentEntry) {
    currentEntry.spinner.classList.remove('active');
    currentEntry = null;
  }
}

function scrollToBottom() {
  scrollArea.scrollTop = scrollArea.scrollHeight;
}

function badge(text, cls) {
  const el = document.createElement('span');
  el.className = cls;
  el.textContent = text;
  return el;
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

document.getElementById('question-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuery(); }
});

loadHistory();
</script>
</body>
</html>
