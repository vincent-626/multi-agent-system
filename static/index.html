<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:   #1a1d23;
      --bg-mid:    #22262e;
      --bg-light:  #f4f5f7;
      --border:    #2e3340;
      --accent:    #4f8ef7;
      --accent-dim:#2a4a8a;
      --text:      #e2e4e9;
      --text-dim:  #8b92a5;
      --green:     #3ecf8e;
      --yellow:    #f5a623;
      --red:       #e85d5d;
      --mono:      'Fira Mono', 'Cascadia Code', 'Consolas', monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: var(--bg-mid);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header p  { font-size: 0.8rem; color: var(--text-dim); }

    #health-dots { margin-left: auto; display: flex; gap: 10px; align-items: center; font-size: 0.75rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .dot.ok  { background: var(--green); }
    .dot.err { background: var(--red); }

    /* ── Layout ─────────────────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    aside {
      width: 280px;
      min-width: 240px;
      background: var(--bg-mid);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 20px;
    }

    aside h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
      font-size: 0.82rem;
      color: var(--text-dim);
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); color: var(--text); }
    .upload-zone input { display: none; }

    #upload-status {
      font-size: 0.78rem;
      color: var(--text-dim);
      min-height: 18px;
    }

    /* ── Content area ───────────────────────────────────────────── */
    section.content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-light);
      color: #1a1d23;
    }

    /* ── Response area ──────────────────────────────────────────── */
    #response-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    /* ── Spinner ─────────────────────────────────────────────────── */
    #spinner {
      display: none;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-size: 0.9rem;
      padding: 12px 0;
    }
    #spinner.active { display: flex; }

    .spin-ring {
      width: 18px; height: 18px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Reasoning trace ─────────────────────────────────────────── */
    details.trace {
      background: var(--bg-dark);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    details.trace summary {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      user-select: none;
      background: var(--bg-mid);
    }
    details.trace summary:hover { background: var(--border); }

    #trace-rows { padding: 4px 0; }

    .trace-row {
      display: grid;
      grid-template-columns: 130px 110px 1fr;
      gap: 6px;
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .trace-row:last-child { border-bottom: none; }
    .trace-row .agent { color: var(--accent); font-weight: 600; }
    .trace-row .action { color: var(--yellow); }
    .trace-row .output { color: var(--text); white-space: pre-wrap; word-break: break-word; }

    /* ── Thinking disclosure ──────────────────────────────────────── */
    .thinking-details {
      border-bottom: 1px solid var(--border);
    }
    .thinking-details summary {
      padding: 3px 14px;
      cursor: pointer;
      font-size: 0.68rem;
      color: var(--text-dim);
      font-style: italic;
      user-select: none;
      list-style: none;
    }
    .thinking-details summary::before { content: '▶ '; font-style: normal; font-size: 0.6rem; }
    .thinking-details[open] summary::before { content: '▼ '; }
    .thinking-details summary:hover { color: var(--text); }
    .thinking-content {
      padding: 6px 14px 10px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-word;
      border-top: 1px dashed var(--border);
    }

    /* ── Final answer ────────────────────────────────────────────── */
    #answer-box {
      background: #fff;
      border: 1px solid #dde1ea;
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 16px;
      line-height: 1.65;
      font-size: 0.95rem;
      white-space: pre-wrap;
      display: none;
    }

    /* ── Meta badges ─────────────────────────────────────────────── */
    #meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #e8ebf2;
      color: #444;
    }
    .badge.conf-high   { background: #d4f5e5; color: #1a7a52; }
    .badge.conf-medium { background: #fef3cc; color: #7a5a00; }
    .badge.conf-low    { background: #fde0e0; color: #7a1a1a; }
    .badge.memory      { background: #dde9ff; color: #1a3a8a; }
    .badge.web         { background: #e6d9fa; color: #4a1a8a; }
    .badge.source      { background: #e8ebf2; color: #333; }
    .badge.web-src     { background: #e8ebf2; }
    .badge.web-src a   { color: var(--accent-dim); text-decoration: none; font-size: 0.72rem; }
    .badge.web-src a:hover { text-decoration: underline; }

    /* ── Input bar ───────────────────────────────────────────────── */
    .input-bar {
      border-top: 1px solid #dde1ea;
      background: #fff;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
    }
    #question-input {
      flex: 1;
      border: 1px solid #ccd0da;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .15s;
    }
    #question-input:focus { border-color: var(--accent); }
    #question-input:disabled { background: #f0f1f4; }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .9; }
    .btn-secondary { background: #e8ebf2; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #d8dce8; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Multi-Agent System</h1>
    <p>Orchestrator · RAG Specialist · Web Search · Calculator</p>
  </div>
  <div id="health-dots">
    <span class="dot" id="dot-ollama" title="Ollama"></span> Ollama
    <span class="dot" id="dot-qdrant" title="Qdrant"></span> Qdrant
  </div>
</header>

<main>
  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <aside>
    <div>
      <h2>API Key</h2>
      <input
        type="password"
        id="api-key-input"
        placeholder="Leave blank if not set"
        style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg-dark);color:var(--text);font-size:0.82rem;outline:none;"
      />
    </div>

    <div>
      <h2>Upload Document</h2>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".pdf,.txt" />
        Drop a PDF or TXT here<br/>or click to browse
      </div>
      <div id="upload-status"></div>
    </div>
  </aside>

  <!-- ── Content ─────────────────────────────────────────────────── -->
  <section class="content">
    <div id="response-area">
      <div id="spinner"><div class="spin-ring"></div> Thinking…</div>

      <!-- Reasoning trace (accordion) -->
      <details class="trace" id="trace-details">
        <summary>Reasoning Trace <span id="trace-count"></span></summary>
        <div id="trace-rows"></div>
      </details>

      <!-- Final answer -->
      <div id="answer-box"></div>

      <!-- Badges: confidence / sources / web -->
      <div id="meta-row"></div>
    </div>

    <div class="input-bar">
      <input
        type="text"
        id="question-input"
        placeholder="Ask a question…"
        autocomplete="off"
      />
      <button class="btn btn-primary" id="submit-btn" onclick="submitQuery()">Ask</button>
      <button class="btn btn-secondary" id="clear-btn" onclick="clearUI()">Clear</button>
    </div>
  </section>
</main>

<script>
// ── User identity ────────────────────────────────────────────────────────────
// Generate a UUID on first visit and persist it for the lifetime of the device.
const USER_ID = (() => {
  const key = 'mas_user_id';
  let id = localStorage.getItem(key);
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem(key, id);
  }
  return id;
})();

// ── API key ───────────────────────────────────────────────────────────────────
const apiKeyInput = document.getElementById('api-key-input');
apiKeyInput.value = localStorage.getItem('mas_api_key') || '';
apiKeyInput.addEventListener('input', () => {
  localStorage.setItem('mas_api_key', apiKeyInput.value);
});
function apiKeyParam() {
  const k = apiKeyInput.value.trim();
  return k ? '?api_key=' + encodeURIComponent(k) : '';
}

// ── Health check ─────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/health');
    const d = await r.json();
    document.getElementById('dot-ollama').className = 'dot ' + (d.ollama ? 'ok' : 'err');
    document.getElementById('dot-qdrant').className = 'dot ' + (d.qdrant ? 'ok' : 'err');
  } catch (_) {}
}
checkHealth();
setInterval(checkHealth, 15000);

// ── Upload ───────────────────────────────────────────────────────────────────
const uploadZone = document.getElementById('upload-zone');
const fileInput  = document.getElementById('file-input');
const uploadStatus = document.getElementById('upload-status');

uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) doUpload(fileInput.files[0]);
});
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]);
});

async function doUpload(file) {
  uploadStatus.textContent = `Uploading ${file.name}…`;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch('/ingest' + apiKeyParam(), { method: 'POST', body: fd });
    const d = await r.json();
    if (r.ok) {
      uploadStatus.textContent = `✓ ${file.name} — ${d.chunks} chunks ingested`;
      uploadStatus.style.color = '#1a7a52';
    } else {
      uploadStatus.textContent = `✗ ${d.detail || 'Upload failed'}`;
      uploadStatus.style.color = '#c0392b';
    }
  } catch (e) {
    uploadStatus.textContent = `✗ Network error`;
    uploadStatus.style.color = '#c0392b';
  }
}

// ── Query + SSE ──────────────────────────────────────────────────────────────
let activeSource = null;

function submitQuery() {
  const input = document.getElementById('question-input');
  const q = input.value.trim();
  if (!q) return;

  // Reset UI
  clearUI(false);
  setLoading(true);

  // Open SSE connection via POST (using fetch + ReadableStream)
  fetch('/query' + apiKeyParam(), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: q, user_id: USER_ID }),
  }).then(resp => {
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function pump() {
      reader.read().then(({ done, value }) => {
        if (done) { setLoading(false); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') { setLoading(false); return; }
            try { handleEvent(JSON.parse(raw)); } catch (_) {}
          }
        }
        pump();
      });
    }
    pump();
  }).catch(err => {
    setLoading(false);
    showError(err.message);
  });
}

let stepCount = 0;

function handleEvent(ev) {
  if (ev.type === 'step') {
    stepCount++;
    document.getElementById('trace-count').textContent = `(${stepCount})`;
    document.getElementById('trace-details').open = true;
    const container = document.getElementById('trace-rows');

    const row = document.createElement('div');
    row.className = 'trace-row';
    row.innerHTML =
      `<span class="agent">${esc(ev.agent)}</span>` +
      `<span class="action">${esc(ev.action)}${ev.tool_used ? ' ['+esc(ev.tool_used)+']' : ''}</span>` +
      `<span class="output">${esc(ev.output || '')}</span>`;
    container.appendChild(row);

    if (ev.thinking) {
      const details = document.createElement('details');
      details.className = 'thinking-details';
      const summary = document.createElement('summary');
      summary.textContent = 'thinking';
      const content = document.createElement('div');
      content.className = 'thinking-content';
      content.textContent = ev.thinking;
      details.appendChild(summary);
      details.appendChild(content);
      container.appendChild(details);
    }

    row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  if (ev.type === 'final') {
    const box = document.getElementById('answer-box');
    box.textContent = ev.answer;
    box.style.display = 'block';
    renderMeta(ev);
    box.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  if (ev.type === 'error') {
    showError(ev.message);
  }
}

function renderMeta(ev) {
  const row = document.getElementById('meta-row');
  row.innerHTML = '';

  // Confidence badge
  const conf = (ev.confidence || 'medium').toLowerCase();
  const confClass = conf === 'high' ? 'conf-high' : conf === 'low' ? 'conf-low' : 'conf-medium';
  row.appendChild(badge(`Confidence: ${conf}`, 'badge ' + confClass));

  // Memory badge
  if (ev.from_memory) row.appendChild(badge('From memory', 'badge memory'));

  // Web search used badge
  if (ev.web_sources && ev.web_sources.length > 0)
    row.appendChild(badge('Web search used', 'badge web'));

  // Document sources
  (ev.sources || []).forEach(s => row.appendChild(badge('📄 ' + s, 'badge source')));

  // Web sources as links
  (ev.web_sources || []).forEach(url => {
    const b = document.createElement('span');
    b.className = 'badge web-src';
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = '🔗 ' + truncate(url, 40);
    b.appendChild(a);
    row.appendChild(b);
  });
}

function badge(text, cls) {
  const el = document.createElement('span');
  el.className = cls;
  el.textContent = text;
  return el;
}

function setLoading(on) {
  document.getElementById('spinner').classList.toggle('active', on);
  document.getElementById('question-input').disabled = on;
  document.getElementById('submit-btn').disabled = on;
}

function clearUI(resetInput = true) {
  if (resetInput) document.getElementById('question-input').value = '';
  document.getElementById('trace-rows').innerHTML = '';
  document.getElementById('trace-count').textContent = '';
  document.getElementById('answer-box').style.display = 'none';
  document.getElementById('answer-box').textContent = '';
  document.getElementById('meta-row').innerHTML = '';
  document.getElementById('spinner').classList.remove('active');
  stepCount = 0;
}

function showError(msg) {
  const box = document.getElementById('answer-box');
  box.textContent = '⚠ Error: ' + msg;
  box.style.display = 'block';
  box.style.borderColor = '#e85d5d';
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

// Submit on Enter
document.getElementById('question-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuery(); }
});
</script>
</body>
</html>
